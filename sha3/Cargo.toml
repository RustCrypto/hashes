[package]
name = "sha3"
version = "0.11.0"
authors = ["RustCrypto Developers"]
edition = "2024"
rust-version = "1.85"
documentation = "https://docs.rs/sha3"
readme = "README.md"
repository = "https://github.com/RustCrypto/hashes"
license = "MIT OR Apache-2.0"
keywords = ["keccak", "hash", "xof", "digest"]
categories = ["cryptography", "no-std"]
description = "Implementation of the SHA-3 family of cryptographic hash algorithms"

[dependencies]
digest = "0.11"
keccak = "0.2"

[dev-dependencies]
digest = { version = "0.11", features = ["dev"] }
hex-literal = "1"

[features]
default = ["alloc", "oid"]
alloc = ["digest/alloc"]
oid = ["digest/oid"] # Enable OID support.
zeroize = ["digest/zeroize"]

[package.metadata.docs.rs]
all-features = true
