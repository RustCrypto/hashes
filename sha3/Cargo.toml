[package]
name = "sha3"
version = "0.11.0-rc.9"
authors = ["RustCrypto Developers"]
edition = "2024"
rust-version = "1.85"
documentation = "https://docs.rs/sha3"
readme = "README.md"
repository = "https://github.com/RustCrypto/hashes"
license = "MIT OR Apache-2.0"
keywords = ["sha3", "keccak", "hash", "digest"]
categories = ["cryptography", "no-std"]
description = """
Pure Rust implementation of SHA-3, a family of Keccak-based hash functions
including the SHAKE family of eXtendable-Output Functions (XOFs), as well as
the accelerated variant TurboSHAKE
"""

[dependencies]
digest = "0.11"
keccak = "0.2"

[dev-dependencies]
digest = { version = "0.11", features = ["dev"] }
hex-literal = "1"

[features]
default = ["alloc", "oid"]
alloc = ["digest/alloc"]
oid = ["digest/oid"] # Enable OID support.
zeroize = ["digest/zeroize"]

[package.metadata.docs.rs]
all-features = true
