[package]
name = "skein"
version = "0.2.0"
authors = ["RustCrypto Developers"]
edition = "2024"
rust-version = "1.85"
documentation = "https://docs.rs/skein"
readme = "README.md"
repository = "https://github.com/RustCrypto/hashes"
license = "MIT OR Apache-2.0"
keywords = ["skein", "hash", "digest"]
categories = ["cryptography", "no-std"]
description = "Skein hash functions"

[dependencies]
digest = "0.11"
threefish = { version = "0.6", default-features = false }

[dev-dependencies]
digest = { version = "0.11", features = ["dev"] }
hex-literal = "1"

[features]
default = ["alloc"]
alloc = ["digest/alloc"]
zeroize = ["digest/zeroize", "threefish/zeroize"]

[package.metadata.docs.rs]
all-features = true
